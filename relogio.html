<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRUMO | Relógio Global Universal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .clock-card { background: #1e293b; padding: 35px; border-radius: 25px; border: 2px solid #38bdf8; text-align: center; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #334155; background: #f8fafc; color: #1e293b; font-size: 18px; font-weight: bold; outline: none; }
        #time { font-size: 65px; font-weight: 900; color: #38bdf8; margin: 15px 0; font-family: 'Courier New', monospace; }
        #location-display { font-size: 22px; color: #fbbf24; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        #date { color: #94a3b8; font-size: 16px; margin-bottom: 25px; }
        .back-link { margin-top: 25px; display: inline-block; color: #38bdf8; text-decoration: none; font-weight: bold; padding: 12px 25px; border: 2px solid #38bdf8; border-radius: 12px; }
    </style>
</head>
<body>

<h2 style="letter-spacing: 4px; color: #38bdf8; margin-bottom: 20px;">PRUMO UTILITÁRIOS</h2>

<div class="clock-card">
    <p style="color: #94a3b8; margin-bottom: 15px; font-weight: bold;">BUSCA MUNDIAL (CIDADE OU PAÍS)</p>
    <input list="world-tz" id="citySearch" class="search-box" placeholder="Ex: Lima, Peru, New York..." oninput="updateTz()">
   
    <datalist id="world-tz"></datalist>

    <div style="margin-top: 30px;">
        <div id="location-display">BRASÍLIA, BRASIL</div>
        <div id="time">00:00:00</div>
        <div id="date">Carregando...</div>
    </div>
</div>

<a href="index.html" class="back-link">← VOLTAR</a>

<script>
    let currentTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const datalist = document.getElementById('world-tz');
    const allTimezones = Intl.supportedValuesOf('timeZone');
   
    allTimezones.forEach(tz => {
        let opt = document.createElement('option');
        let cleanName = tz.split('/').pop().replace('_', ' ');
        opt.value = cleanName;
        datalist.appendChild(opt);
    });

    function updateTz() {
        const inputVal = document.getElementById('citySearch').value.toLowerCase();
        const found = allTimezones.find(tz => tz.toLowerCase().includes(inputVal.replace(' ', '_')));
        if (found) {
            currentTz = found;
            document.getElementById('location-display').textContent = found.replace('_', ' ').split('/').join(' - ');
        }
    }

    function tick() {
        const now = new Date();
        const tOpts = { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: currentTz, hour12: false };
        const dOpts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: currentTz };
        document.getElementById('time').textContent = now.toLocaleTimeString('pt-BR', tOpts);
        document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', dOpts);
    }
    setInterval(tick, 1000);
    tick();
</script>

</body>
</html>
