<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRUMO | Relógio Global Total</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .clock-container { background: #2d3436; padding: 30px; border-radius: 20px; border: 2px solid #0984e3; text-align: center; width: 100%; max-width: 450px; box-shadow: 0 0 30px rgba(9, 132, 227, 0.3); }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; background: #1a1a1a; color: white; border: 1px solid #0984e3; font-size: 16px; box-sizing: border-box; }
        #time { font-size: 55px; font-weight: 900; color: #0984e3; margin: 10px 0; font-family: 'Courier New', Courier, monospace; }
        #location-display { font-size: 18px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        #date { color: #dfe6e9; margin-bottom: 20px; }
        .back-link { margin-top: 20px; display: inline-block; color: #0984e3; text-decoration: none; font-weight: bold; padding: 10px 20px; border: 1px solid #0984e3; border-radius: 8px; transition: 0.3s; }
        .back-link:hover { background: #0984e3; color: white; }
    </style>
</head>
<body>

<h2 style="letter-spacing: 3px; color: #0984e3;">PRUMO | GLOBAL TIME</h2>

<div class="clock-container">
    <p style="margin-bottom: 10px; color: #dfe6e9;">Digite o nome da Cidade ou País:</p>
    <input list="timezones" id="timezoneInput" class="search-box" placeholder="Ex: Hong Kong, Chile, Iraq..." oninput="updateTimezone()">
   
    <datalist id="timezones"></datalist>

    <div id="location-display">Brasília, Brasil</div>
    <div id="time">00:00:00</div>
    <div id="date">Carregando...</div>
</div>

<a href="index.html" class="back-link">← VOLTAR AO MENU</a>

<script>
    const input = document.getElementById('timezoneInput');
    const display = document.getElementById('location-display');
    let currentTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

    const tzList = Intl.supportedValuesOf('timeZone');
    const datalist = document.getElementById('timezones');
    tzList.forEach(tz => {
        const option = document.createElement('option');
        option.value = tz;
        datalist.appendChild(option);
    });

    function updateTimezone() {
        const val = input.value;
        if (tzList.includes(val)) {
            currentTimezone = val;
            display.textContent = val.replace(/_/g, ' ').split('/').pop();
        }
    }

    function tick() {
        const now = new Date();
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: currentTimezone, hour12: false };
        const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: currentTimezone };
       
        try {
            document.getElementById('time').textContent = now.toLocaleTimeString('pt-BR', timeOptions);
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', dateOptions);
        } catch (e) {}
    }

    setInterval(tick, 1000);
    tick();
</script>

</body>
</html>
