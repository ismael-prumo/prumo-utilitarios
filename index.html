<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRUMO | Hub de Utilitários</title>
    <style>
        :root { --primary: #0984e3; --dark: #2d3436; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; text-align: center; }
        header { background: var(--dark); color: white; padding: 50px 20px; border-bottom: 6px solid var(--primary); }
        .logo { letter-spacing: 8px; font-size: 36px; font-weight: 900; margin: 0; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; } }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-decoration: none; color: inherit; transition: 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card h3 { margin: 0 0 10px; color: var(--primary); }
        .card p { font-size: 14px; color: #636e72; }
    </style>
</head>
<body>

<header>
    <h1 class="logo">PRUMO</h1>
    <p>Utilidade & Precisão</p>
</header>

<div class="container">
    <a href="recibo.html" class="card">
        <h3>Gerador de Recibo</h3>
        <p>Emita recibos profissionais em PDF rapidamente.</p>
    </a>
    <a href="relogio.html" class="card">
        <h3>Relógio de Precisão</h3>
        <p>Horário mundial sincronizado com design moderno.</p>
    </a>
    <a href="analisador.html" class="card">
        <h3>Analisador Esportivo</h3>
        <p>Estatísticas avançadas para futebol e apostas.</p>
    </a>
</div>

</body>
</html>
